name: reinar_panel

services:
  pg_db:
    image: postgres:16
    container_name: pg_db
    environment:
      - POSTGRES_USER=${PG_ADMIN}
      - POSTGRES_PASSWORD=${PG_ADMIN_PASSWORD}
      - POSTGRES_DB=${PG_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_ADMIN}"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: on-failure
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./secrets/dumps:/docker-entrypoint-initdb.d:z
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    image: redis:7.2-alpine
    container_name: redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"

  web-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web-service
    depends_on:
      pg_db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:${ADMIN_PORT}/api/v1/healthcheck')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
#    restart: always
    environment:
      - ENV_FILE=/run/secrets/env.api.prod
    network_mode: host
    volumes:
      - ./secrets/keys:/app/web/secrets/keys:ro
      - ./web_logs:/app/web/web_logs
      - ./arq_logs:/app/web/arq_logs
    secrets:
      - env.api.prod
      - private_key.pem
      - public_key.pem

  sub-service:
    build:
      context: ./sub
      dockerfile: Dockerfile
    container_name: sub-service
    command: python -m web.sub.main
    depends_on:
      pg_db:
        condition: service_healthy
      web-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:${SUB_PORT}/api/v1/healthcheck')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
#    restart: always
    environment:
      - ENV_FILE=/run/secrets/env.sub.prod
    network_mode: host
    volumes:
      - .sub/sub_logs:/app/sub/sub_logs
    secrets:
      - env.sub.prod

  arq-sub-worker:
    build:
      context: ./sub
      dockerfile: Dockerfile
    container_name: arq-sub-worker
    command: python -m arq web.sub.config_dir.arq_config.WorkerSettings
    depends_on:
      pg_db:
        condition: service_healthy
      sub-service:
        condition: service_healthy
#    restart: always
    environment:
      - ENV_FILE=/run/secrets/env.sub.prod
    network_mode: host
    volumes:
      - .sub/arq_logs:/app/sub/arq_logs
    secrets:
      - env.sub.prod


volumes:
  pgdata:
    driver: local

secrets:
  env.api.prod:
    file: .env.api.prod
  env.sub.prod:
    file: sub/.env.sub.prod
  private_key.pem:
    file: secrets/keys/private_key.pem
  public_key.pem:
    file: secrets/keys/public_key.pem

